<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="nexus-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b8cff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="nexus-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b8cff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#0f0f14"/>

  <!-- Subtle glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#nexus-glow)"/>

  <!-- Hexagonal node network forming abstract "N" -->
  <!-- Left vertical stroke -->
  <path d="M 160 140 L 160 372"
        stroke="url(#nexus-gradient)" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- Diagonal connecting stroke -->
  <path d="M 160 140 L 352 372"
        stroke="url(#nexus-gradient)" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- Right vertical stroke -->
  <path d="M 352 140 L 352 372"
        stroke="url(#nexus-gradient)" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- Node dots at connection points -->
  <circle cx="160" cy="140" r="16" fill="#7b8cff"/>
  <circle cx="160" cy="372" r="16" fill="#6366f1"/>
  <circle cx="352" cy="140" r="16" fill="#34d399"/>
  <circle cx="352" cy="372" r="16" fill="#34d399"/>

  <!-- Center diamond accent -->
  <circle cx="256" cy="256" r="8" fill="#fff" opacity="0.6"/>
</svg>
